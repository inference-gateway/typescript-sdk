---
name: Claude Code

on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  issues:
    types:
      - opened
      - assigned
  pull_request_review:
    types:
      - submitted

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.48.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install additional dependencies
        run: npm install -g markdownlint-cli

      - name: Install maintainer skill
        run: |
          mkdir -p ~/.claude/skills/maintainer
          curl -fsSL \
            https://raw.githubusercontent.com/inference-gateway/skills/main/skills/maintainer/SKILL.md \
            -o ~/.claude/skills/maintainer/SKILL.md

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          display_report: true
          additional_permissions: |
            actions: read
          use_commit_signing: true
          base_branch: main
          branch_prefix: 'claude/'
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "Bash(task:*),Bash(node:*),Bash(gh:*),Bash(git:*)"
            --mcp-config '{"mcpServers":{"context7":{"command":"npx","args":["-y","@upstash/context7-mcp@latest"]}}}'
